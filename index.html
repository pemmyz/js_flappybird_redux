<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Bird 2.5D - Fixed 60FPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fullscreen Toggle -->
    <button id="fullscreenBtn" class="fs-btn">⛶ FULLSCREEN</button>

    <div class="main-wrapper" id="mainWrapper">
        <!-- LEFT: Controls -->
        <div class="controls-area">
            <h2>CONTROLS</h2>
            <div class="btn-group">
                <button id="flapBtn" class="game-btn big-btn">FLAP</button>
                <button id="pauseBtn" class="game-btn">PAUSE (P)</button>
                <button id="difficultyBtn" class="game-btn">MODE (N)</button>
            </div>
        </div>

        <!-- CENTER: Game Canvas -->
        <div class="game-area" id="gameContainer">
            <div id="startMessage" class="message-overlay">
                <strong>FLAPPY 2.5D</strong><br><br>
                Press SPACE, UP<br>or Click to Start
            </div>
            <div id="pausedMessage" class="message-overlay" style="display: none;">PAUSED</div>
            <div id="gameOverMessage" class="message-overlay" style="display: none;">
                <strong>GAME OVER</strong><br><br>
                Score: <span id="finalScore">0</span><br><br>
                Press UP/Space to Restart
            </div>
        </div>

        <!-- RIGHT: Score & Info -->
        <div class="info-area">
            <div class="score-box">
                <span class="label">SCORE</span>
                <div id="scoreDisplay">0</div>
            </div>
            
            <div class="stats-box">
                <div class="stat-item">
                    <span class="label">GATE SIZE</span>
                    <span id="pipeGapDisplay" class="value">160</span>
                </div>
                <div class="stat-item">
                    <span class="label">DIFFICULTY</span>
                    <span id="difficultyDisplayElement" class="value">Normal</span>
                </div>
                <div class="stat-item">
                    <span class="label">AUTOBOT</span>
                    <span id="autobotStatusDisplay" class="value">OFF</span>
                </div>
                <div id="autobotDemoStatusDisplay" class="highlight"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
